<style>

            background: theme('colors.surface-container-lowest');

            border-radius: 2rem;
        }
        
        .clay-btn {
            background: theme('colors.primary-container');
            box-shadow: 
                10px 10px 20px rgba(0, 0, 0, 0.1),
                -5px -5px 15px rgba(255, 255, 255, 0.9),
                inset 2px 2px 4px rgba(255, 255, 255, 0.9),
                inset -2px -2px 4px rgba(0, 0, 0, 0.06);
            transition: all 0.2s ease;
        }
        
        .clay-btn:active {
            box-shadow: 
                3px 3px 6px rgba(0, 0, 0, 0.06),
                -2px -2px 5px rgba(255, 255, 255, 0.6),
                inset 5px 5px 10px rgba(0, 0, 0, 0.1),
                inset -5px -5px 10px rgba(255, 255, 255, 0.9);
            transform: scale(0.98);
        }

        .clay-badge {

                -3px -3px 8px rgba(255, 255, 255, 0.9),
                inset 2px 2px 3px rgba(255, 255, 255, 0.6);
        }

        .clay-slider-track {
            background: theme('colors.surface-container-high');
            box-shadow: inset 5px 5px 10px rgba(0, 0, 0, 0.1), inset -5px -5px 10px rgba(255, 255, 255, 0.95);
            border-radius: 999px;
        }
        
        .clay-slider-thumb {
            background: theme('colors.primary');
            box-shadow: 
                0px 5px 10px rgba(0, 0, 0, 0.18),
                inset 3px 3px 6px rgba(255, 255, 255, 0.5);
            border-radius: 50%;
